name: CI for Azure Review Board

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Validate browser modules
        run: |
          node --check app/main.mjs
          node --check app/utils.mjs
          node --check app/auth.mjs
          node --check app/exporter.mjs
          node --check app/data/reviewMeta.mjs
          node --check app/data/siteContent.mjs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Start local server
        run: |
          python -m http.server 8000 &
          sleep 5

      - name: Smoke test static assets
        run: |
          curl -f http://127.0.0.1:8000/
          curl -f http://127.0.0.1:8000/app/main.mjs
          curl -f http://127.0.0.1:8000/app/styles.css
          curl -f http://127.0.0.1:8000/data/research_knowledge_base.csv

