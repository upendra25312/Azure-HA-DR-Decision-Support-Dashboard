name: CI/CD for Azure HA/DR Dashboard

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Start local server
        run: |
          python -m http.server 8000 &
          sleep 5

      - name: Install Playwright browsers
        run: npm run playwright-install

      - name: Run Playwright UI validation
        run: node playwright-dashboard-validation.js

      - name: Lint HTML/JS (optional)
        run: |
          pip install html5validator || true
          html5validator --root . || true

